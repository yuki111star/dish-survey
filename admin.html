<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .error {
            background: #ffe6e6;
            color: #ff4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .error.show { display: block; }
        .admin-content { display: none; }
        .admin-content.show { display: block; }
        .login-content { display: block; }
        .login-content.hide { display: none; }
        .section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .dish-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        .dish-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .dish-input .emoji { font-size: 24px; }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            background: #f0f0f0;
        }
        .preview.show { display: block; }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
            display: none;
        }
        .loading.show { display: block; }
        .success {
            text-align: center;
            padding: 20px;
            color: #4caf50;
            display: none;
        }
        .success.show { display: block; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .file-input {
            width: 100%;
            padding: 15px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
            background: white;
        }
        .file-input:hover { border-color: #667eea; background: #f0f4ff; }
        .logout-btn {
            background: #ff6b6b;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录页面 -->
        <div class="login-content" id="loginContent">
            <h1>🔐 管理员登录</h1>
            <p class="subtitle">请输入管理员密码</p>
            
            <div class="error" id="error">密码错误，请重试</div>
            
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" onkeypress="if(event.keyCode===13) login()">
            </div>
            
            <button class="btn" onclick="login()">登录</button>
            
            <a href="index.html" class="back-link">← 返回问卷</a>
        </div>
        
        <!-- 管理页面 -->
        <div class="admin-content" id="adminContent">
            <h1>👨‍🍳 菜品管理</h1>
            <p class="subtitle">拍照识别菜品，更新问卷</p>
            
            <div class="section">
                <div class="section-title">📸 拍照识别菜品</div>
                <input type="file" id="photoInput" accept="image/*" capture="camera" style="display:none;" onchange="previewImage(this)">
                <div class="file-input" onclick="document.getElementById('photoInput').click()">
                    📷 点击拍照或选择图片
                </div>
                <img id="preview" class="preview">
                <button class="btn" id="recognizeBtn" onclick="recognize()" disabled>🔍 识别菜品</button>
                <div class="loading" id="loading">正在识别...</div>
            </div>
            
            <div class="section">
                <div class="section-title">🍽️ 今日菜品</div>
                <div class="dish-input">
                    <span class="emoji">🥗</span>
                    <input type="text" id="dish1" placeholder="菜品 1 名称">
                </div>
                <div class="dish-input">
                    <span class="emoji">🥬</span>
                    <input type="text" id="dish2" placeholder="菜品 2 名称">
                </div>
                <div class="dish-input">
                    <span class="emoji">🍖</span>
                    <input type="text" id="dish3" placeholder="菜品 3 名称">
                </div>
                <button class="btn" onclick="updateSurvey()">✅ 更新问卷</button>
                <button class="btn logout-btn" onclick="logout()">退出登录</button>
            </div>
            
            <div class="success" id="success">
                <div style="font-size:50px;margin-bottom:10px;">✅</div>
                <div>问卷已更新！</div>
            </div>
            
            <a href="index.html" class="back-link">← 返回问卷</a>
        </div>
    </div>
    
    <script>
        const REPO = 'yuki111star/dish-survey';
        const ADMIN_PASSWORD = '123';
        let recognizedDishes = [];
        
        // 检查登录状态
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            showAdmin();
        }
        
        function login() {
            const password = document.getElementById('password').value;
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                showAdmin();
            } else {
                document.getElementById('error').classList.add('show');
            }
        }
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }
        
        function showAdmin() {
            document.getElementById('loginContent').classList.add('hide');
            document.getElementById('adminContent').classList.add('show');
        }
        
        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('preview');
                    img.src = e.target.result;
                    img.classList.add('show');
                    document.getElementById('recognizeBtn').disabled = false;
                };
                reader.readAsDataURL(file);
            }
        }
        
        async function recognize() {
            const fileInput = document.getElementById('photoInput');
            const file = fileInput.files[0];
            if (!file) return;
            
            const loading = document.getElementById('loading');
            const btn = document.getElementById('recognizeBtn');
            loading.classList.add('show');
            btn.disabled = true;
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64 = e.target.result.split(',')[1];
                
                try {
                    // 调用 AI 识别服务
                    const response = await fetch('https://api.openclaw.ai/recognize', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64 })
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        recognizedDishes = result.dishes || [];
                        
                        if (recognizedDishes[0]) document.getElementById('dish1').value = recognizedDishes[0];
                        if (recognizedDishes[1]) document.getElementById('dish2').value = recognizedDishes[1];
                        if (recognizedDishes[2]) document.getElementById('dish3').value = recognizedDishes[2];
                        
                        alert('识别成功！请确认菜品名称后点击"更新问卷"');
                    } else {
                        alert('识别失败，请手动输入菜品名称');
                    }
                } catch (err) {
                    console.error(err);
                    alert('识别失败，请手动输入菜品名称');
                }
                
                loading.classList.remove('show');
                btn.disabled = false;
            };
            reader.readAsDataURL(file);
        }
        
        async function updateSurvey() {
            const dish1 = document.getElementById('dish1').value.trim();
            const dish2 = document.getElementById('dish2').value.trim();
            const dish3 = document.getElementById('dish3').value.trim();
            
            if (!dish1 || !dish2 || !dish3) {
                alert('请填写所有菜品名称');
                return;
            }
            
            const btn = document.querySelector('.btn[onclick="updateSurvey()"]');
            btn.disabled = true;
            btn.textContent = '正在更新...';
            
            alert('问卷更新功能需要配置 GitHub Token。\n\n请将以下菜品名称发送给 AI 助手：\n\n菜品 1: ' + dish1 + '\n菜品 2: ' + dish2 + '\n菜品 3: ' + dish3 + '\n\nAI 助手会自动更新问卷！');
            
            btn.disabled = false;
            btn.textContent = '✅ 更新问卷';
            document.getElementById('success').classList.add('show');
        }
    </script>
</body>
</html>
