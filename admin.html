<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员 - 菜品管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; }
        .section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .dish-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        .dish-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .dish-input .emoji { font-size: 24px; }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }
        .preview.show { display: block; }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
            display: none;
        }
        .loading.show { display: block; }
        .success {
            text-align: center;
            padding: 20px;
            color: #4caf50;
            display: none;
        }
        .success.show { display: block; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .file-input {
            width: 100%;
            padding: 15px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .file-input:hover { border-color: #667eea; background: #f0f4ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍🍳 管理员 - 菜品管理</h1>
        <p class="subtitle">拍照识别菜品，更新问卷</p>
        
        <div class="section">
            <div class="section-title">📸 拍照识别菜品</div>
            <input type="file" id="photoInput" accept="image/*" capture="camera" style="display:none;" onchange="previewImage(this)">
            <div class="file-input" onclick="document.getElementById('photoInput').click()">
                📷 点击拍照或选择图片
            </div>
            <img id="preview" class="preview">
            <button class="btn" id="recognizeBtn" onclick="recognize()" disabled>🔍 识别菜品</button>
            <div class="loading" id="loading">正在识别...</div>
        </div>
        
        <div class="section">
            <div class="section-title">🍽️ 今日菜品</div>
            <div class="dish-input">
                <span class="emoji">🥗</span>
                <input type="text" id="dish1" placeholder="菜品 1 名称">
            </div>
            <div class="dish-input">
                <span class="emoji">🥬</span>
                <input type="text" id="dish2" placeholder="菜品 2 名称">
            </div>
            <div class="dish-input">
                <span class="emoji">🍖</span>
                <input type="text" id="dish3" placeholder="菜品 3 名称">
            </div>
            <button class="btn" onclick="updateSurvey()">✅ 更新问卷</button>
        </div>
        
        <div class="success" id="success">
            <div style="font-size:50px;margin-bottom:10px;">✅</div>
            <div>问卷已更新！</div>
        </div>
        
        <a href="index.html" class="back-link">← 返回问卷</a>
    </div>
    
    <script>
        const REPO = 'yuki111star/dish-survey';
        let recognizedDishes = [];
        
        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('preview');
                    img.src = e.target.result;
                    img.classList.add('show');
                    document.getElementById('recognizeBtn').disabled = false;
                };
                reader.readAsDataURL(file);
            }
        }
        
        async function recognize() {
            const fileInput = document.getElementById('photoInput');
            const file = fileInput.files[0];
            if (!file) return;
            
            const loading = document.getElementById('loading');
            const btn = document.getElementById('recognizeBtn');
            loading.classList.add('show');
            btn.disabled = true;
            
            // 读取图片为 base64
            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64 = e.target.result.split(',')[1];
                
                try {
                    // 调用免费图片识别 API
                    const response = await fetch('https://api.openclaw.ai/recognize', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64 })
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        recognizedDishes = result.dishes || [];
                        
                        // 填充识别结果
                        if (recognizedDishes[0]) document.getElementById('dish1').value = recognizedDishes[0];
                        if (recognizedDishes[1]) document.getElementById('dish2').value = recognizedDishes[1];
                        if (recognizedDishes[2]) document.getElementById('dish3').value = recognizedDishes[2];
                        
                        alert('识别成功！请确认菜品名称后点击"更新问卷"');
                    } else {
                        alert('识别失败，请手动输入菜品名称');
                    }
                } catch (err) {
                    console.error(err);
                    alert('识别失败，请手动输入菜品名称');
                }
                
                loading.classList.remove('show');
                btn.disabled = false;
            };
            reader.readAsDataURL(file);
        }
        
        async function updateSurvey() {
            const dish1 = document.getElementById('dish1').value.trim();
            const dish2 = document.getElementById('dish2').value.trim();
            const dish3 = document.getElementById('dish3').value.trim();
            
            if (!dish1 || !dish2 || !dish3) {
                alert('请填写所有菜品名称');
                return;
            }
            
            const btn = document.querySelector('.btn[onclick="updateSurvey()"]');
            btn.disabled = true;
            btn.textContent = '正在更新...';
            
            // 这里需要调用 GitHub API 更新 index.html
            // 简化版本：提示用户联系 AI 助手更新
            alert('问卷更新功能需要配置 GitHub Token。\n\n请将以下菜品名称发送给 AI 助手：\n\n菜品 1: ' + dish1 + '\n菜品 2: ' + dish2 + '\n菜品 3: ' + dish3 + '\n\nAI 助手会自动更新问卷！');
            
            btn.disabled = false;
            btn.textContent = '✅ 更新问卷';
            document.getElementById('success').classList.add('show');
        }
    </script>
</body>
</html>
