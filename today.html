<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日菜品评分 - 2026 年 4 月 1 日</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 22px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 13px; }
        .date-info {
            background: #f0f4ff;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #667eea;
            font-weight: bold;
        }
        .dish-card {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .dish-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }
        .dish-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dish-name .emoji { font-size: 22px; }
        .rating-section { margin-top: 10px; }
        .rating-label { 
            font-size: 14px; 
            color: #666; 
            margin-bottom: 12px; 
            display: block;
            font-weight: bold;
        }
        .rating-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .rating-option {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
        }
        .rating-option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .rating-option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }
        .rating-option input {
            margin-right: 12px;
            width: 20px;
            height: 20px;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .success-message {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .success-message .checkmark { font-size: 60px; margin-bottom: 15px; }
        .success-message h2 { color: #4caf50; margin-bottom: 10px; font-size: 22px; }
        .success-message p { color: #666; margin-bottom: 15px; }
        .form-content { display: block; }
        .form-content.hidden { display: none; }
        .required { color: #ff4444; }
        .result-box {
            background: #f8f9fa;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            font-size: 13px;
            white-space: pre-wrap;
            display: none;
            text-align: left;
        }
        .copy-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        .copy-btn:hover { background: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 每日菜品评分</h1>
        <p class="subtitle">请为今天的菜品打分</p>
        
        <div class="date-info">
            📅 2026 年 4 月 1 日 星期三
        </div>
        
        <form id="surveyForm">
            <div class="form-content" id="formContent">
                <!-- 菜品 1 -->
                <div class="dish-card">
                    <div class="dish-name">
                        <span class="emoji">🥗</span>
                        <span>菜品 1：青豆炒肉</span>
                    </div>
                    <div class="rating-section">
                        <label class="rating-label">评分 <span class="required">*</span></label>
                        <div class="rating-options">
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating1" value="1" required>
                                <span>😞 1 分 - 不好吃</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating1" value="2">
                                <span>😐 2 分 - 一般</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating1" value="3">
                                <span>😊 3 分 - 好吃</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating1" value="4">
                                <span>🤩 4 分 - 非常好吃</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating1" value="5">
                                <span>🏆 5 分 - 最好吃</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- 菜品 2 -->
                <div class="dish-card">
                    <div class="dish-name">
                        <span class="emoji">🥬</span>
                        <span>菜品 2：炒青菜</span>
                    </div>
                    <div class="rating-section">
                        <label class="rating-label">评分 <span class="required">*</span></label>
                        <div class="rating-options">
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating2" value="1" required="required">
                                <span>😞 1 分 - 不好吃</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating2" value="2">
                                <span>😐 2 分 - 一般</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating2" value="3">
                                <span>😊 3 分 - 好吃</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating2" value="4">
                                <span>🤩 4 分 - 非常好吃</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating2" value="5">
                                <span>🏆 5 分 - 最好吃</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- 菜品 3 -->
                <div class="dish-card">
                    <div class="dish-name">
                        <span class="emoji">🍖</span>
                        <span>菜品 3：红烧肉配油豆腐</span>
                    </div>
                    <div class="rating-section">
                        <label class="rating-label">评分 <span class="required">*</span></label>
                        <div class="rating-options">
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating3" value="1" required>
                                <span>😞 1 分 - 不好吃</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating3" value="2">
                                <span>😐 2 分 - 一般</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating3" value="3">
                                <span>😊 3 分 - 好吃</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating3" value="4">
                                <span>🤩 4 分 - 非常好吃</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating3" value="5">
                                <span>🏆 5 分 - 最好吃</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">提交评分</button>
            </div>
        </form>
        
        <div class="success-message" id="successMessage">
            <div class="checkmark">✅</div>
            <h2>提交成功！</h2>
            <p>感谢你的评分！</p>
            <div class="result-box" id="resultBox"></div>
            <button class="copy-btn" onclick="copyResult()">📋 复制结果</button>
            <p style="margin-top:15px;color:#666;font-size:13px;">复制后发送给机器人</p>
        </div>
    </div>
    
    <script>
        function selectOption(element) {
            const parent = element.parentElement;
            const options = parent.querySelectorAll('.rating-option');
            options.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
        }
        
        document.getElementById('surveyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const rating1 = document.querySelector('input[name="rating1"]:checked')?.value;
            const rating2 = document.querySelector('input[name="rating2"]:checked')?.value;
            const rating3 = document.querySelector('input[name="rating3"]:checked')?.value;
            
            if (!rating1) {
                alert('请为菜品 1（青豆炒肉）评分');
                document.querySelector('input[name="rating1"]').scrollIntoView({behavior: 'smooth', block: 'center'});
                return;
            }
            if (!rating2) {
                alert('请为菜品 2（炒青菜）评分');
                document.querySelector('input[name="rating2"]').scrollIntoView({behavior: 'smooth', block: 'center'});
                return;
            }
            if (!rating3) {
                alert('请为菜品 3（红烧肉配油豆腐）评分');
                document.querySelector('input[name="rating3"]').scrollIntoView({behavior: 'smooth', block: 'center'});
                return;
            }
            
            const result = `📊 菜品评分提交
📅 日期：2026 年 4 月 1 日

🥗 菜品 1：青豆炒肉
   ⭐ 评分：${rating1}分

🥬 菜品 2：炒青菜
   ⭐ 评分：${rating2}分

🍖 菜品 3：红烧肉配油豆腐
   ⭐ 评分：${rating3}分`;
            
            document.getElementById('formContent').classList.add('hidden');
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('resultBox').textContent = result;
            
            navigator.clipboard.writeText(result).then(() => {
                setTimeout(() => alert('评分已自动复制！'), 300);
            }).catch(() => {});
        });
        
        function copyResult() {
            const text = document.getElementById('resultBox').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板！');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }
    </script>
</body>
</html>
