<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日菜品评分</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        .date {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .dish {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fafafa;
        }
        .dish-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .rating-row {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }
        .rating-opt {
            flex: 1;
            padding: 10px 5px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            font-size: 12px;
        }
        .rating-opt:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .rating-opt input { display: none; }
        .rating-opt.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }
        .submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .submit:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .success { display: none; text-align: center; padding: 40px 20px; }
        .success .check { font-size: 60px; margin-bottom: 15px; }
        .success h2 { color: #4caf50; margin-bottom: 10px; }
        .form { display: block; }
        .form.hidden { display: none; }
        .loading { text-align: center; padding: 10px; color: #666; display: none; }
        .loading.show { display: block; }
        .stats-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 每日菜品评分</h1>
        <p class="subtitle">请为今天的菜品打分</p>
        <div class="date" id="dateDisplay">📅 加载中...</div>
        
        <form id="form">
            <div class="dish">
                <div class="dish-name">🥗 青豆炒肉</div>
                <div class="rating-row">
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r1" value="1" required><span>😞<br>1 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r1" value="2"><span>😐<br>2 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r1" value="3"><span>😊<br>3 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r1" value="4"><span>🤩<br>4 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r1" value="5"><span>🏆<br>5 分</span></label>
                </div>
            </div>
            
            <div class="dish">
                <div class="dish-name">🥬 炒青菜</div>
                <div class="rating-row">
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r2" value="1" required><span>😞<br>1 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r2" value="2"><span>😐<br>2 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r2" value="3"><span>😊<br>3 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r2" value="4"><span>🤩<br>4 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r2" value="5"><span>🏆<br>5 分</span></label>
                </div>
            </div>
            
            <div class="dish">
                <div class="dish-name">🍖 红烧肉配油豆腐</div>
                <div class="rating-row">
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r3" value="1" required><span>😞<br>1 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r3" value="2"><span>😐<br>2 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r3" value="3"><span>😊<br>3 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r3" value="4"><span>🤩<br>4 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="r3" value="5"><span>🏆<br>5 分</span></label>
                </div>
            </div>
            
            <div class="loading" id="loading">正在提交...</div>
            <button type="submit" class="submit">提交评分</button>
        </form>
        
        <div class="success" id="success">
            <div class="check">✅</div>
            <h2>提交成功！</h2>
            <p>感谢你的评分！</p>
            <a href="stats.html" class="stats-link">📊 查看统计结果</a>
        </div>
    </div>
    
    <script>
        document.getElementById('dateDisplay').textContent = '📅 ' + new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',weekday:'long'});
        
        function sel(el) {
            const parent = el.parentElement;
            parent.querySelectorAll('.rating-opt').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }
        
        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const r1 = document.querySelector('input[name="r1"]:checked')?.value;
            const r2 = document.querySelector('input[name="r2"]:checked')?.value;
            const r3 = document.querySelector('input[name="r3"]:checked')?.value;
            
            if (!r1 || !r2 || !r3) {
                alert('请为每个菜品评分');
                return;
            }
            
            const btn = document.querySelector('.submit');
            const loading = document.getElementById('loading');
            btn.disabled = true;
            loading.classList.add('show');
            
            // 保存数据到 localStorage
            const data = {
                date: new Date().toLocaleDateString('zh-CN'),
                timestamp: Date.now(),
                dish1: parseInt(r1),
                dish2: parseInt(r2),
                dish3: parseInt(r3)
            };
            
            let allData = JSON.parse(localStorage.getItem('dishSurveyData') || '[]');
            allData.push(data);
            localStorage.setItem('dishSurveyData', JSON.stringify(allData));
            
            // 显示成功
            setTimeout(() => {
                document.getElementById('form').classList.add('hidden');
                document.getElementById('success').style.display = 'block';
                btn.disabled = false;
                loading.classList.remove('show');
            }, 500);
        });
    </script>
</body>
</html>
