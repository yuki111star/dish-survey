<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日菜品评分</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 26px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        .date-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }
        .dish-card {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            background: #fafafa;
        }
        .dish-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.15);
        }
        .dish-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dish-name .emoji { font-size: 24px; }
        .rating-section { margin-top: 10px; }
        .rating-label { 
            font-size: 15px; 
            color: #555; 
            margin-bottom: 15px; 
            display: block;
            font-weight: 600;
        }
        .rating-options {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .rating-option {
            flex: 1;
            min-width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
            font-size: 13px;
        }
        .rating-option:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
        }
        .rating-option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .rating-option input {
            margin-right: 6px;
            width: 18px;
            height: 18px;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 25px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .success-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .success-message .checkmark { font-size: 70px; margin-bottom: 20px; }
        .success-message h2 { color: #4caf50; margin-bottom: 15px; font-size: 24px; }
        .success-message p { color: #666; font-size: 15px; }
        .form-content { display: block; }
        .form-content.hidden { display: none; }
        .required { color: #ff4444; }
        .stats-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .stats-link:hover {
            background: #e8eaff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 每日菜品评分</h1>
        <p class="subtitle">请为今天的菜品打分，帮助我们改进！</p>
        
        <div class="date-info" id="dateDisplay">
            📅 加载中...
        </div>
        
        <form id="surveyForm">
            <div class="form-content" id="formContent">
                <!-- 菜品 1 -->
                <div class="dish-card">
                    <div class="dish-name">
                        <span class="emoji">🥗</span>
                        <span id="dish1Name">菜品 1</span>
                    </div>
                    <div class="rating-section">
                        <label class="rating-label">评分 <span class="required">*</span></label>
                        <div class="rating-options">
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating1" value="1" required>
                                <span>😞<br>1 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating1" value="2">
                                <span>😐<br>2 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating1" value="3">
                                <span>😊<br>3 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating1" value="4">
                                <span>🤩<br>4 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating1" value="5">
                                <span>🏆<br>5 分</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- 菜品 2 -->
                <div class="dish-card">
                    <div class="dish-name">
                        <span class="emoji">🥬</span>
                        <span id="dish2Name">菜品 2</span>
                    </div>
                    <div class="rating-section">
                        <label class="rating-label">评分 <span class="required">*</span></label>
                        <div class="rating-options">
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating2" value="1" required>
                                <span>😞<br>1 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating2" value="2">
                                <span>😐<br>2 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating2" value="3">
                                <span>😊<br>3 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating2" value="4">
                                <span>🤩<br>4 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating2" value="5">
                                <span>🏆<br>5 分</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- 菜品 3 -->
                <div class="dish-card">
                    <div class="dish-name">
                        <span class="emoji">🍖</span>
                        <span id="dish3Name">菜品 3</span>
                    </div>
                    <div class="rating-section">
                        <label class="rating-label">评分 <span class="required">*</span></label>
                        <div class="rating-options">
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating3" value="1" required>
                                <span>😞<br>1 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating3" value="2">
                                <span>😐<br>2 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating3" value="3">
                                <span>😊<br>3 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating3" value="4">
                                <span>🤩<br>4 分</span>
                            </label>
                            <label class="rating-option" onclick="selectOption(this)">
                                <input type="radio" name="rating3" value="5">
                                <span>🏆<br>5 分</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">提交评分</button>
            </div>
        </form>
        
        <div class="success-message" id="successMessage">
            <div class="checkmark">✅</div>
            <h2>提交成功！</h2>
            <p>感谢你的评分，帮助我们改进菜品！</p>
            <a href="stats.html" class="stats-link">📊 查看统计结果</a>
        </div>
    </div>
    
    <script>
        // 显示日期
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('dateDisplay').textContent = '📅 ' + now.toLocaleDateString('zh-CN', options);
        }
        updateDate();
        
        // 获取菜品数据
        const dishes = [
            {name: '青豆炒肉'},
            {name: '炒青菜'},
            {name: '红烧肉配油豆腐'}
        ];
        
        document.getElementById('dish1Name').textContent = '🥗 ' + dishes[0].name;
        document.getElementById('dish2Name').textContent = '🥬 ' + dishes[1].name;
        document.getElementById('dish3Name').textContent = '🍖 ' + dishes[2].name;
        
        // 选择评分
        function selectOption(element) {
            const parent = element.parentElement;
            const options = parent.querySelectorAll('.rating-option');
            options.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
        }
        
        // 提交表单
        document.getElementById('surveyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const rating1 = document.querySelector('input[name="rating1"]:checked')?.value;
            const rating2 = document.querySelector('input[name="rating2"]:checked')?.value;
            const rating3 = document.querySelector('input[name="rating3"]:checked')?.value;
            
            if (!rating1 || !rating2 || !rating3) {
                alert('请为每道菜品评分');
                return;
            }
            
            const data = {
                date: new Date().toISOString().split('T')[0],
                timestamp: Date.now(),
                ratings: {
                    dish1: parseInt(rating1),
                    dish2: parseInt(rating2),
                    dish3: parseInt(rating3)
                },
                dishes: dishes.map(d => d.name)
            };
            
            // 保存到 localStorage（临时）
            let allData = JSON.parse(localStorage.getItem('dishSurveyData') || '[]');
            allData.push(data);
            localStorage.setItem('dishSurveyData', JSON.stringify(allData));
            
            // 显示成功
            document.getElementById('formContent').classList.add('hidden');
            document.getElementById('successMessage').style.display = 'block';
        });
    </script>
</body>
</html>
