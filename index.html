<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日菜品评分</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        .date {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .dish {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fafafa;
        }
        .dish-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .rating-row {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }
        .rating-opt {
            flex: 1;
            padding: 10px 5px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            font-size: 12px;
        }
        .rating-opt:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .rating-opt input {
            display: none;
        }
        .rating-opt.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }
        .submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .success {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .success .check { font-size: 60px; margin-bottom: 15px; }
        .success h2 { color: #4caf50; margin-bottom: 10px; }
        .form { display: block; }
        .form.hidden { display: none; }
        .loading {
            text-align: center;
            padding: 10px;
            color: #666;
            display: none;
        }
        .loading.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 每日菜品评分</h1>
        <p class="subtitle">请为今天的菜品打分</p>
        <div class="date" id="dateDisplay">📅 加载中...</div>
        
        <form class="form" id="form" action="https://formspree.io/f/mgopzkdp" method="POST">
            <div class="dish">
                <div class="dish-name">🥗 青豆炒肉</div>
                <div class="rating-row">
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 1 评分" value="1" required><span>😞<br>1 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 1 评分" value="2"><span>😐<br>2 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 1 评分" value="3"><span>😊<br>3 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 1 评分" value="4"><span>🤩<br>4 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 1 评分" value="5"><span>🏆<br>5 分</span></label>
                </div>
            </div>
            
            <div class="dish">
                <div class="dish-name">🥬 炒青菜</div>
                <div class="rating-row">
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 2 评分" value="1" required><span>😞<br>1 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 2 评分" value="2"><span>😐<br>2 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 2 评分" value="3"><span>😊<br>3 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 2 评分" value="4"><span>🤩<br>4 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 2 评分" value="5"><span>🏆<br>5 分</span></label>
                </div>
            </div>
            
            <div class="dish">
                <div class="dish-name">🍖 红烧肉配油豆腐</div>
                <div class="rating-row">
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 3 评分" value="1" required><span>😞<br>1 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 3 评分" value="2"><span>😐<br>2 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 3 评分" value="3"><span>😊<br>3 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 3 评分" value="4"><span>🤩<br>4 分</span></label>
                    <label class="rating-opt" onclick="sel(this)"><input type="radio" name="菜品 3 评分" value="5"><span>🏆<br>5 分</span></label>
                </div>
            </div>
            
            <input type="hidden" name="日期" id="dateField">
            <input type="hidden" name="时间戳" id="timeField">
            
            <div class="loading" id="loading">正在提交...</div>
            <button type="submit" class="submit">提交评分</button>
        </form>
        
        <div class="success" id="success">
            <div class="check">✅</div>
            <h2>提交成功！</h2>
            <p>感谢你的评分！</p>
        </div>
    </div>
    
    <script>
        document.getElementById('dateDisplay').textContent = '📅 ' + new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',weekday:'long'});
        document.getElementById('dateField').value = new Date().toLocaleDateString('zh-CN');
        document.getElementById('timeField').value = new Date().toISOString();
        
        function sel(el) {
            const parent = el.parentElement;
            parent.querySelectorAll('.rating-opt').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }
        
        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.querySelector('.submit');
            const loading = document.getElementById('loading');
            btn.disabled = true;
            loading.classList.add('show');
            
            const formData = new FormData(this);
            fetch(this.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    document.getElementById('form').classList.add('hidden');
                    document.getElementById('success').style.display = 'block';
                } else {
                    alert('提交失败，请重试');
                    btn.disabled = false;
                }
                loading.classList.remove('show');
            }).catch(() => {
                alert('网络错误，请重试');
                btn.disabled = false;
                loading.classList.remove('show');
            });
        });
    </script>
</body>
</html>
