<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜品评分统计</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-card .dish-name {
            font-size: 16px;
            margin-bottom: 15px;
            opacity: 0.9;
        }
        .stat-card .score {
            font-size: 48px;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }
        .stat-card .count {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 10px;
        }
        .chart-container {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .chart-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        .chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 200px;
            padding: 20px 0;
        }
        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .bar {
            width: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px 8px 0 0;
            transition: height 0.5s ease;
        }
        .bar-label {
            font-size: 13px;
            color: #666;
            text-align: center;
        }
        .bar-value {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        .back-link {
            display: block;
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
        }
        .back-link:hover {
            background: #e8eaff;
        }
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .no-data .emoji { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 菜品评分统计</h1>
        <p class="subtitle">实时统计所有评分数据</p>
        
        <div id="statsContent">
            <div class="stats-grid" id="statsGrid"></div>
            
            <div class="chart-container">
                <div class="chart-title">评分对比</div>
                <div class="chart" id="chart"></div>
            </div>
        </div>
        
        <div class="no-data" id="noData" style="display: none;">
            <div class="emoji">📭</div>
            <h2>暂无数据</h2>
            <p>还没有人提交评分，快去邀请同事填写吧！</p>
        </div>
        
        <a href="index.html" class="back-link">← 返回问卷填写</a>
    </div>
    
    <script>
        // 加载数据
        const allData = JSON.parse(localStorage.getItem('dishSurveyData') || '[]');
        
        if (allData.length === 0) {
            document.getElementById('statsContent').style.display = 'none';
            document.getElementById('noData').style.display = 'block';
        } else {
            // 计算平均分
            const dish1Total = allData.reduce((sum, d) => sum + d.ratings.dish1, 0);
            const dish2Total = allData.reduce((sum, d) => sum + d.ratings.dish2, 0);
            const dish3Total = allData.reduce((sum, d) => sum + d.ratings.dish3, 0);
            
            const dish1Avg = (dish1Total / allData.length).toFixed(1);
            const dish2Avg = (dish2Total / allData.length).toFixed(1);
            const dish3Avg = (dish3Total / allData.length).toFixed(1);
            
            const dishes = allData[0].dishes;
            
            // 显示统计卡片
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="dish-name">🥗 ${dishes[0]}</div>
                    <div class="score">${dish1Avg}</div>
                    <div class="label">平均分</div>
                    <div class="count">${allData.length} 人评分</div>
                </div>
                <div class="stat-card">
                    <div class="dish-name">🥬 ${dishes[1]}</div>
                    <div class="score">${dish2Avg}</div>
                    <div class="label">平均分</div>
                    <div class="count">${allData.length} 人评分</div>
                </div>
                <div class="stat-card">
                    <div class="dish-name">🍖 ${dishes[2]}</div>
                    <div class="score">${dish3Avg}</div>
                    <div class="label">平均分</div>
                    <div class="count">${allData.length} 人评分</div>
                </div>
            `;
            
            // 显示图表
            const chart = document.getElementById('chart');
            const maxScore = Math.max(dish1Avg, dish2Avg, dish3Avg, 5);
            chart.innerHTML = `
                <div class="bar-group">
                    <div class="bar-value">${dish1Avg}</div>
                    <div class="bar" style="height: ${(dish1Avg / maxScore) * 150}px;"></div>
                    <div class="bar-label">🥗<br>菜品 1</div>
                </div>
                <div class="bar-group">
                    <div class="bar-value">${dish2Avg}</div>
                    <div class="bar" style="height: ${(dish2Avg / maxScore) * 150}px;"></div>
                    <div class="bar-label">🥬<br>菜品 2</div>
                </div>
                <div class="bar-group">
                    <div class="bar-value">${dish3Avg}</div>
                    <div class="bar" style="height: ${(dish3Avg / maxScore) * 150}px;"></div>
                    <div class="bar-label">🍖<br>菜品 3</div>
                </div>
            `;
        }
    </script>
</body>
</html>
